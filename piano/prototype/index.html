<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MR Piano Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-label="MR piano desktop prototype">
        <div class="panel">
          <p class="eyebrow">Desktop prototype</p>
          <h1>MR Piano</h1>
          <p class="summary">
            Quest 3に移す前に、鍵盤、入力、音、反応の気持ちよさをここで育てます。
          </p>
        </div>

        <div class="instrument" aria-label="One octave piano">
          <div class="keys" id="pianoKeys"></div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
